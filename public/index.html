<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registo de Saquetas de Cromos</title>
  <style>
    body {font-family: Arial, sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem;}
    h1 {text-align: center;}
    .summary {margin-top: 1rem; padding: 1rem; border: 1px solid #ddd;}
    input[type='number'], input[type='password'] {width: 120px; padding: 0.3rem;}
    button {margin-left: .5rem; padding: 0.4rem 0.8rem;}
    ul {list-style:none; padding:0;}
    li {margin: .5rem 0; border-bottom:1px solid #eee; padding-bottom:.5rem;}
    .error {color: #d00; font-size: 0.9rem;}
  </style>
</head>
<body>
  <h1>Registo de Saquetas de Cromos</h1>

  <div>
    <label for="packs">Número de saquetas:</label>
    <input type="number" id="packs" min="1" value="1" />
  </div>
  <div style="margin-top:0.5rem;">
    <label for="password">Password:</label>
    <input type="password" id="password" />
    <span id="errorMsg" class="error"></span>
  </div>
  <div style="margin-top:0.8rem;">
    <button id="addBtn">Adicionar</button>
  </div>

  <div class="summary" id="summary">
    <p>Total de cromos: <span id="totalStickers">0</span></p>
    <p>Total gasto: <span id="totalCost">0.00</span> €</p>
  </div>

  <h2>Histórico de compras</h2>
  <ul id="history"></ul>

  <script>
    // API endpoints
    const API_URL = '/api/purchases';
    const PASSWORD = '*+++*'; // mesma password do server.js

    // Carregar compras da API
    async function loadPurchases() {
      try {
        const response = await fetch(API_URL);
        return await response.json();
      } catch (err) {
        console.error('Erro ao carregar compras:', err);
        return [];
      }
    }

    // Adicionar compra via API
    async function addPurchase(packs, password) {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ packs, password })
      });
      return response.json();
    }

    // Eliminar compra via API
    async function deletePurchase(id, password) {
      const response = await fetch(`${API_URL}/${id}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      return response.json();
    }

    // Renderizar interface
    async function render() {
      const purchases = await loadPurchases();
      const totalStickers = purchases.reduce((a, p) => a + p.stickers, 0);
      const totalCost = purchases.reduce((a, p) => a + p.cost, 0);
      document.getElementById('totalStickers').textContent = totalStickers;
      document.getElementById('totalCost').textContent = totalCost.toFixed(2);

      const list = document.getElementById('history');
      list.innerHTML = '';
      purchases.slice().reverse().forEach((p, idx) => {
        const li = document.createElement('li');
        li.textContent = `${p.date}: ${p.packs} saqueta(s) → ${p.stickers} cromos, gasto ${p.cost.toFixed(2)} € `;
        const del = document.createElement('button');
        del.textContent = 'Eliminar';
        del.onclick = async () => {
          const pwd = prompt('Password para eliminar:');
          if (pwd !== PASSWORD) { alert('Password incorreta!'); return; }
          await deletePurchase(p.id, pwd);
          render();
        };
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    // Handler do botão Adicionar
    document.getElementById('addBtn').onclick = async () => {
      const packs = parseInt(document.getElementById('packs').value);
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = '';

      if (!packs || packs < 1) return alert('Número inválido');

      const result = await addPurchase(packs, password);
      if (result.error) {
        errorMsg.textContent = result.error;
        return;
      }

      document.getElementById('packs').value = 1;
      document.getElementById('password').value = '';
      render();
    };

    // Inicializar
    render();
  </script>
</body>
</html>
